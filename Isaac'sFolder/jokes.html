<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Jokes</title>
    <style>
      :root {
        --bg: #070a18;
        --card: rgba(12, 16, 40, 0.72);
        --text: #e8eef7;
        --muted: #b6c3ff;
        --blue: #2f7bff;
        --pink: #ff4fd8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background: radial-gradient(900px 520px at 18% 10%, rgba(47, 123, 255, 0.34), transparent 58%),
          radial-gradient(900px 520px at 82% 18%, rgba(255, 79, 216, 0.22), transparent 62%),
          radial-gradient(1100px 700px at 50% 110%, rgba(47, 123, 255, 0.18), transparent 60%),
          linear-gradient(180deg, rgba(7, 10, 24, 0.98), rgba(7, 10, 24, 1));
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        line-height: 1.5;
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 56px 20px;
      }

      header {
        display: grid;
        gap: 14px;
        padding: 28px 24px;
        border: 1px solid rgba(47, 123, 255, 0.22);
        background: linear-gradient(180deg, rgba(12, 16, 40, 0.92), rgba(12, 16, 40, 0.62));
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      }

      .badge {
        width: fit-content;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(232, 238, 247, 0.95);
        background: linear-gradient(90deg, rgba(47, 123, 255, 0.22), rgba(255, 79, 216, 0.18));
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 30px rgba(47, 123, 255, 0.18);
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 6vw, 56px);
        line-height: 1.05;
        letter-spacing: -0.02em;
        text-transform: uppercase;
      }

      h1 span {
        background: linear-gradient(90deg, var(--blue), var(--pink));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      p {
        margin: 0;
        max-width: 70ch;
        color: var(--muted);
        font-size: 16px;
      }

      .card {
        margin-top: 14px;
        padding: 18px 18px;
        border-radius: 16px;
        border: 1px solid rgba(47, 123, 255, 0.22);
        background: linear-gradient(180deg, rgba(12, 16, 40, 0.82), rgba(12, 16, 40, 0.55));
      }

      .joke {
        font-size: 18px;
        color: rgba(232, 238, 247, 0.95);
      }

      .answer {
        margin-top: 10px;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px dashed rgba(255, 255, 255, 0.18);
        background: linear-gradient(90deg, rgba(47, 123, 255, 0.12), rgba(255, 79, 216, 0.1));
        color: rgba(232, 238, 247, 0.95);
      }

      .answer[hidden] {
        display: none;
      }

      .actions {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button,
      .link-btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(232, 238, 247, 0.95);
        padding: 10px 14px;
        border-radius: 999px;
        font-weight: 800;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      }

      .link-btn {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        line-height: 1;
      }

      button:hover,
      .link-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(47, 123, 255, 0.32);
        background: linear-gradient(90deg, rgba(47, 123, 255, 0.16), rgba(255, 79, 216, 0.12));
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header>
        <div class="badge">Gym Jokes</div>
        <h1><span>Gym Jokes</span></h1>
        <p>Tap “New Joke” to get a question, then “Reveal Answer” when you’re ready.</p>
        <p><a class="link-btn" href="index.html">Click here to go home</a></p>

        <section class="card" aria-label="Joke generator">
          <div class="joke" id="jokeQuestion" aria-live="polite"></div>
          <div class="answer" id="jokeAnswer" hidden></div>

          <div class="actions">
            <button type="button" id="newJoke">New Joke</button>
            <button type="button" id="revealAnswer">Reveal Answer</button>
          </div>
        </section>
      </header>
    </main>

    <script>
      const jokes = [
        {
          q: "Why did the dumbbell break up with the barbell?",
          a: 'Because it felt too “weighted” down.',
        },
        {
          q: "Why don’t gym people ever get lost?",
          a: "Because they always find their way back to the squat rack.",
        },
        {
          q: "Why did the treadmill feel sad?",
          a: "It was going nowhere in life.",
        },
        {
          q: "Why did the gym member bring string to the workout?",
          a: "To tie up loose ends… and maybe skip leg day.",
        },
        {
          q: "What’s a weightlifter’s favorite type of music?",
          a: "Heavy metal.",
        },
        {
          q: "Why did the protein shake go to therapy?",
          a: "It couldn’t handle being blended into everything.",
        },
        {
          q: "Why did the mirror break at the gym?",
          a: "It couldn’t handle the gains.",
        },
        {
          q: "Why don’t bodybuilders ever argue?",
          a: "They don’t want to strain themselves.",
        },
        {
          q: "What do you call a gym that never closes?",
          a: 'A “24/7 flex appeal.”',
        },
        {
          q: "Why did the gym bro bring a ladder?",
          a: "To take his workouts to the next level.",
        },
      ];

      const questionEl = document.getElementById("jokeQuestion");
      const answerEl = document.getElementById("jokeAnswer");
      const newBtn = document.getElementById("newJoke");
      const revealBtn = document.getElementById("revealAnswer");

      let current = null;

      function pickJoke() {
        let next = jokes[Math.floor(Math.random() * jokes.length)];
        if (jokes.length > 1 && current && next.q === current.q) {
          next = jokes[(jokes.indexOf(next) + 1) % jokes.length];
        }
        current = next;
        questionEl.textContent = current.q;
        answerEl.textContent = current.a;
        answerEl.hidden = true;
        revealBtn.textContent = "Reveal Answer";
      }

      function toggleAnswer() {
        if (!current) return;
        answerEl.hidden = !answerEl.hidden;
        revealBtn.textContent = answerEl.hidden ? "Reveal Answer" : "Hide Answer";
      }

      newBtn.addEventListener("click", pickJoke);
      revealBtn.addEventListener("click", toggleAnswer);

      pickJoke();
    </script>
  </body>
</html>
